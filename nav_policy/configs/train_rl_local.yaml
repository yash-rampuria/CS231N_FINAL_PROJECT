# RL fine-tuning — local machine paths (maven server).
# Run from nav_policy/ dir:
#   cd /home/yashr/CS231N/3dgs/workspace
#   python -m nav_policy.rl.train_rl --config /home/yashr/CS231N/V-LEAD/nav_policy/configs/train_rl_local.yaml

base_config: configs/flightroom.yaml

checkpoint: /home/yashr/CS231N/checkpoints/bc_best_balanced_dagger_r12_new.pt

frame: carl
Kv: 2.0
Ka: 5.0

rl:
  algorithm: ppo          # ppo | sac
  run_tag: rl_ppo_local
  checkpoint_dir: /home/yashr/CS231N/V-LEAD/nav_policy/data/checkpoints_rl_local
  seed: 0
  n_iterations: 20
  rollouts_per_iteration: 4
  init_log_std: -2.0
  freeze_backbone: false
  eval_deterministic: true
  reuse_simulator: true
  compress_transitions: true
  eval_every_episodes: 20
  eval_subset_size: 3
  eval_config: configs/eval_closed_loop_flightroom.yaml

  rewards:
    progress_weight: 1.0
    heading_weight: 0.1
    step_penalty: -0.01
    action_smooth_weight: 0.15
    collision_penalty: -1000.0
    bbox_penalty: -1000.0
    success_bonus: 50.0
    success_position_tol: 1.9
    success_yaw_tol_rad: 0.5
    bbox_margin: 2.0

  rollout:
    run_until_terminal: true
    max_rollout_s: 40.0
    start_mode: expert_x0
    collision_depth_threshold_m: 0.25
    goal_position_tol_m: 0.5
    goal_yaw_tol_rad: 0.5
    depth_inference_stride: 3
    check_collision: true
    check_goal: true
    warmup_steps: 30
    warmup_kp_pos: 2.0
    warmup_kd_vel: 1.0
    warmup_kp_yaw: 2.0
    warmup_max_vel: 0.8
    warmup_max_yaw_rate: 1.0
    warmup_prime_policy_buffer: true
    settle_vel_mps: 0.3
    settle_body_rate_radps: 0.85
    settle_yaw_rate_radps: 0.30
    settle_steps: 1

  ppo:
    lr: 3.0e-5        # was 3e-4; 10x lower to prevent catastrophic policy updates
    gamma: 0.99
    gae_lambda: 0.95
    clip_eps: 0.2
    value_coef: 0.5
    entropy_coef: 0.01
    max_grad_norm: 0.5  # was 1.0; tighter gradient clipping
    n_epochs: 2         # was 4; fewer epochs since early stopping handles it
    target_kl: 0.05     # stop epoch early if KL exceeds this
    ref_kl_coef: 0.5    # BC anchor: penalise drifting from original BC policy
    batch_size: 256

  sac:
    lr: 3.0e-4
    gamma: 0.99
    tau: 0.005
    alpha: 0.2
    auto_alpha: true
    batch_size: 256
    updates_per_iter: 4
    replay_capacity: 100000

