# Primary model (A2): ResNet-18 + DA2-S + cross-attention + LayerNorm fusion.
# Same as configs/flightroom.yaml — use either path for BC / DAgger fine-tune.

data:
  raw_root: "data/raw"
  processed_root: "data/processed_flightroom"
  cache_blobs_in_memory: false
  cache_lru_size: 128
  bucket_sampling: true

  train_runs:
    - "flightroom_ssv_exp_2026-05-22_064652_training_mode_shuffled_trajs"
    - "flightroom_ssv_exp_2026-05-22_071718"
    - "flightroom_ssv_exp_2026-05-22_071353"

  val_runs:
    - "flightroom_ssv_exp_2026-05-22_071733_trajs-110"
    - "backroom_exp_04-29-26"

window:
  T: 4
  H: 10
  image_size: 224
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]

model:
  arch: rgb_da2_crossattn_v1
  resnet_backbone: "resnet18"
  freeze_stem_and_layer1: true
  gru_hidden: 256
  gru_layers: 1
  mlp_hidden: [256, 128]
  cmd_dim: 4
  goal_emb_dim: 32
  goal_input_dim: 3
  goal_distance_scale: 5.0
  mlp_dropout: 0.1
  depth_feat_dim: 256
  cross_attn_heads: 4

train:
  batch_size: 128
  num_workers: 0
  epochs: 10
  run_tag: a2_da2_crossattn
  color_jitter: true
  observation_latency: 0
  photometric_aug:
    blur_prob: 0.3
    blur_sigma_range: [0.5, 1.5]
    gamma_prob: 0.3
    gamma_range: [0.7, 1.4]
    brightness_prob: 0.3
    brightness_range: [0.6, 1.4]
  lr: 6.0e-4
  weight_decay: 1.0e-4
  lambda_smooth: 0.05
  amp: true
  grad_clip: 1.0
  checkpoint_dir: "data/checkpoints_a2_da2_crossattn"
  log_every: 50
  early_stopping_patience: 3
  seed: 0
