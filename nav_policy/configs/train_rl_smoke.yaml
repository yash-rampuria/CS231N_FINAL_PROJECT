# RL smoke test: 1 iteration, 2 full-val FiGS rollouts, videos.
#
#   python scripts/train_rl.py --config configs/train_rl_smoke.yaml --save-videos
#
# Logs:
#   data/checkpoints_rl_smoke/rl_smoke_episodes.csv
#   data/checkpoints_rl_smoke/rl_smoke_log.csv
#
# Videos (with --save-videos):
#   data/checkpoints_rl_smoke/videos/iter0000_ep00000_smoke_071718_q00_<semantic>.mp4

base_config: configs/flightroom.yaml
checkpoint: data/checkpoints_dagger_balanced_r12/bc_best.pt

frame: carl
Kv: 2.0
Ka: 5.0

save_videos: true

rl:
  algorithm: ppo
  run_tag: rl_smoke
  checkpoint_dir: data/checkpoints_rl_smoke
  seed: 0
  n_iterations: 1
  rollouts_per_iteration: 2
  init_log_std: -1.5
  freeze_backbone: false
  eval_deterministic: false

  rewards:
    progress_weight: 1.0
    heading_weight: 0.1
    step_penalty: -0.01
    action_smooth_weight: 0.05
    collision_penalty: -10.0
    bbox_penalty: -5.0
    success_bonus: 5.0
    success_position_tol: 0.4
    success_yaw_tol_rad: 0.4
    bbox_margin: 2.0

  rollout:
    run_until_terminal: true
    max_rollout_s: 60.0
    start_mode: expert_x0
    collision_depth_threshold_m: 0.25
    goal_position_tol_m: 0.4
    goal_yaw_tol_rad: 0.4
    depth_inference_stride: 3
    check_collision: true
    check_goal: true
    warmup_steps: 30
    warmup_kp_pos: 2.0
    warmup_kd_vel: 1.0
    warmup_kp_yaw: 2.0
    warmup_max_vel: 0.8
    warmup_max_yaw_rate: 1.0
    warmup_prime_policy_buffer: true
    settle_vel_mps: 0.10
    settle_body_rate_radps: 0.30
    settle_yaw_rate_radps: 0.25
    settle_steps: 10

  ppo:
    lr: 3.0e-4
    gamma: 0.99
    gae_lambda: 0.95
    clip_eps: 0.2
    value_coef: 0.5
    entropy_coef: 0.01
    max_grad_norm: 1.0
    n_epochs: 2
    batch_size: 64

rollouts:
  - name: smoke_071718_q00
    scene: flightroom_ssv_exp
    rollout: baseline
    setup_from: data/raw/flightroom_ssv_exp_2026-05-22_071718/trajectories_val00000.pt
    sub_idx: 0

  - name: smoke_071718_q01
    scene: flightroom_ssv_exp
    rollout: baseline
    setup_from: data/raw/flightroom_ssv_exp_2026-05-22_071718/trajectories_val00001.pt
    sub_idx: 0
