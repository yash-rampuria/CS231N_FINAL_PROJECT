# One episode per expert trajectory (8 total) — sanity sweep before 100-ep run.
#
#   docker compose -f nav_policy/docker-compose.yml run --rm nav_policy \
#     python scripts/train_rl.py --config configs/train_rl_expert_x0_sweep.yaml --save-videos

base_config: configs/train_rl_100_expert_x0.yaml

rl:
  run_tag: rl_expert_x0_sweep
  checkpoint_dir: data/checkpoints_rl_expert_x0_sweep
  total_episodes: 8
  save_every_n_iterations: 4

save_videos: true
