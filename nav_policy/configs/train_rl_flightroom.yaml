# RL fine-tuning from BC/DAgger checkpoint (flightroom train scenes only).

# Default algorithm is PPO; set rl.algorithm: sac for Soft Actor-Critic.

#

# Requires FiGS 3DGS scene checkpoints (same as DAgger / closed-loop eval).

# Uses full val trajectories (~13 s start-to-goal), not 2 s training clips.



base_config: configs/flightroom.yaml

checkpoint: data/checkpoints_a2_da2_crossattn/bc_best.pt



frame: carl

Kv: 2.0

Ka: 5.0



rl:

  algorithm: ppo          # ppo | sac

  run_tag: rl_ppo_a2

  checkpoint_dir: data/checkpoints_rl_a2

  seed: 0

  n_iterations: 20

  rollouts_per_iteration: 4

  init_log_std: -0.5

  freeze_backbone: false

  eval_deterministic: false



  rewards:

    progress_weight: 1.0

    heading_weight: 0.1

    step_penalty: -0.01

    action_smooth_weight: 0.05

    collision_penalty: -10.0

    bbox_penalty: -5.0

    success_bonus: 5.0

    success_position_tol: 0.5

    success_yaw_tol_rad: 0.5

    bbox_margin: 2.0



  rollout:

    run_until_terminal: true

    max_rollout_s: 60.0

    start_mode: expert_x0

    # Phase 2: switch to mixed + random_start_prob: 0.3 for recovery training

    collision_depth_threshold_m: 0.25

    goal_position_tol_m: 0.5

    goal_yaw_tol_rad: 0.5

    depth_inference_stride: 3

    check_collision: true

    check_goal: true

    warmup_steps: 30

    warmup_kp_pos: 2.0

    warmup_kd_vel: 1.0

    warmup_kp_yaw: 2.0

    warmup_max_vel: 0.8

    warmup_max_yaw_rate: 1.0

    warmup_prime_policy_buffer: true

    settle_vel_mps: 0.12

    settle_body_rate_radps: 0.35

    settle_yaw_rate_radps: 0.30

    settle_steps: 20



  ppo:

    lr: 3.0e-4

    gamma: 0.99

    gae_lambda: 0.95

    clip_eps: 0.2

    value_coef: 0.5

    entropy_coef: 0.01

    max_grad_norm: 1.0

    n_epochs: 4

    batch_size: 256



  sac:

    lr: 3.0e-4

    gamma: 0.99

    tau: 0.005

    alpha: 0.2

    auto_alpha: true

    batch_size: 256

    updates_per_iter: 4

    replay_capacity: 100000



