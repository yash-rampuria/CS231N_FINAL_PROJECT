# configs/dagger_round1_mpc.yaml -- DAgger round 1 with proper MPC re-solve.
#
# Rollouts are restricted to FLIGHTROOM training environments only.
# backroom is in offline val (processed); packardpark is held out for OOD test.
#
# Training runs used (from configs/flightroom.yaml train_runs):
#   - flightroom_ssv_exp_2026-05-22_064652_training_mode_shuffled_trajs
#   - flightroom_ssv_exp_2026-05-22_071718
#   - flightroom_ssv_exp_2026-05-22_071353
#
# The validation run (071733_trajs-110) is also excluded.

base_config: configs/flightroom.yaml
checkpoint: data/checkpoints_a2_da2_crossattn/bc_best.pt
round: 1
output_run: dagger_r1_mpc
run_tag: dagger_r1_mpc

oracle: mpc
mpc_policy: vrmpc_rrt
frame: carl
Kv: 2.0
Ka: 5.0
split_assignment: train

# Extended horizon: run until goal or collision (180s safety cap).
extended_horizon: true
collection:
  run_until_terminal: true
  max_rollout_s: 180.0
  collision_depth_threshold_m: 0.25
  goal_position_tol_m: 0.5
  goal_yaw_tol_rad: 0.5
  depth_inference_stride: 3
  check_collision: true
  check_goal: true

rollouts:
  # ---- 064652 training run: queries 0-3 ----
  - name: flightroom_064652_q00
    scene: flightroom_ssv_exp
    rollout: baseline
    setup_from: data/raw/flightroom_ssv_exp_2026-05-22_064652_training_mode_shuffled_trajs/trajectories00000.pt
    sub_idx: 0

  - name: flightroom_064652_q01
    scene: flightroom_ssv_exp
    rollout: baseline
    setup_from: data/raw/flightroom_ssv_exp_2026-05-22_064652_training_mode_shuffled_trajs/trajectories00001.pt
