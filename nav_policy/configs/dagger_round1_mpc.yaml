  - name: flightroom_064652_q03
    scene: flightroom_ssv_exp
    rollout: baseline
    setup_from: data/raw/flightroom_ssv_exp_2026-05-22_064652_training_mode_shuffled_trajs/trajectories00003.pt
    sub_idx: 0

  # ---- 071718 training run: queries 0-3 ----
