# In-domain closed-loop suite: >=10 held-out flightroom val rollouts (071733).
# Primary metrics for checkpoint comparison and ablations A0-A5.

checkpoint: data/checkpoints_a2_da2_crossattn/bc_best.pt
output_dir: data/eval/flightroom_val_suite
run_tag: flightroom_val_suite

frame: carl
Kv: 2.0
Ka: 5.0

metrics:
  time_buffer_s: 5.0
  collision_depth_threshold_m: 0.25
  goal_position_tol_m: 0.5
  goal_yaw_tol_rad: 0.5
  success_tracking_tol_m: 1.0
  bbox_margin: 2.0
  depth_inference_stride: 3
  check_collision: true
  check_goal: true
  warmup_steps: 30
  warmup_kp_pos: 2.0
  warmup_kd_vel: 1.0
  warmup_kp_yaw: 2.0
  warmup_max_vel: 0.8
  warmup_max_yaw_rate: 1.0
  warmup_prime_policy_buffer: true

