# Ablation A3: full DA2 cross-attn model without photometric augmentations.

data:
  processed_root: "data/processed_flightroom"
  bucket_sampling: true

window:
  T: 4
  H: 10
  image_size: 224

model:
  arch: rgb_da2_crossattn_v1
  cmd_dim: 4
  gru_hidden: 256
  gru_layers: 1
  mlp_hidden: [256, 128]
  goal_emb_dim: 32
  goal_input_dim: 3
  goal_distance_scale: 5.0
  depth_feat_dim: 256
  cross_attn_heads: 4
  freeze_stem_and_layer1: true

train:
  batch_size: 128
  epochs: 10
  run_tag: a3_no_aug
  color_jitter: false
  photometric_aug:
    blur_prob: 0.0
    gamma_prob: 0.0
    brightness_prob: 0.0
  lr: 6.0e-4
  checkpoint_dir: "data/checkpoints_a3_no_aug"
  early_stopping_patience: 3
  seed: 0
