# Stress-test closed-loop eval on flightroom val (not used for model selection).
# Run with the same checkpoint as eval_closed_loop_flightroom_suite.yaml.

checkpoint: data/checkpoints_a2_da2_crossattn/bc_best.pt
output_dir: data/eval/flightroom_stress
run_tag: flightroom_stress

frame: carl
Kv: 2.0
Ka: 5.0

stress:
  observation_latency: 2
  brightness_factor: 0.4
  blur_sigma: 1.5

metrics:
  time_buffer_s: 5.0
  collision_depth_threshold_m: 0.25
  goal_position_tol_m: 0.5
  goal_yaw_tol_rad: 0.5
  success_tracking_tol_m: 1.0
  bbox_margin: 2.0
  depth_inference_stride: 3
  check_collision: true
  check_goal: true
  warmup_steps: 30
  warmup_kp_pos: 2.0
  warmup_kd_vel: 1.0
  warmup_kp_yaw: 2.0
  warmup_max_vel: 0.8
  warmup_max_yaw_rate: 1.0
  warmup_prime_policy_buffer: true

rollouts:
  - {name: flightroom_val_q00, scene: flightroom_ssv_exp, rollout: baseline,
     setup_from: data/raw/flightroom_ssv_exp_2026-05-22_071733_trajs-110/trajectories_val00000.pt, sub_idx: 0}
  - {name: flightroom_val_q01, scene: flightroom_ssv_exp, rollout: baseline,
     setup_from: data/raw/flightroom_ssv_exp_2026-05-22_071733_trajs-110/trajectories_val00001.pt, sub_idx: 0}
  - {name: flightroom_val_q02, scene: flightroom_ssv_exp, rollout: baseline,
     setup_from: data/raw/flightroom_ssv_exp_2026-05-22_071733_trajs-110/trajectories_val00002.pt, sub_idx: 0}
