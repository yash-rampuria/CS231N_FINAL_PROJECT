# BC-anchored PPO: KL to DAgger init, balanced 8-query updates, eval-based best ckpt.
# Requires FiGS perception_mode.yml set to visual_mode: "rgb"
# (see FiGS-Standalone/configs/perception/perception_mode.yml).
#
#   docker compose -f nav_policy/docker-compose.yml run --rm nav_policy \
#     python scripts/train_rl.py --config configs/train_rl_100_expert_x0_stable.yaml
#
# Outputs:
#   data/checkpoints_rl_100_expert_x0_stable/rl_100_expert_x0_stable_latest.pt
#   data/checkpoints_rl_100_expert_x0_stable/rl_100_expert_x0_stable_best.pt  (best 071733 val success)
#   data/checkpoints_rl_100_expert_x0_stable/rl_100_expert_x0_stable_episodes.csv
#   data/checkpoints_rl_100_expert_x0_stable/rl_100_expert_x0_stable_log.csv

base_config: configs/train_rl_100_expert_x0.yaml

checkpoint: data/checkpoints_dagger_balanced_r12/bc_best.pt

rl:
  run_tag: rl_100_expert_x0_stable
  checkpoint_dir: data/checkpoints_rl_100_expert_x0_stable
  rollouts_per_iteration: 8
  ppo_update_every_episodes: 8
  eval_every_episodes: 24
  eval_config: configs/eval_closed_loop_flightroom_suite.yaml
  init_log_std: -2.5
  freeze_backbone: true
  eval_deterministic: false
  reuse_simulator: true
  sim_cache_clear_every_episodes: 8

  bc_anchor:
    checkpoint: data/checkpoints_dagger_balanced_r12/bc_best.pt
    kl_coef: 0.02

  rewards:
    step_penalty: -0.01
    collision_penalty: -50.0
    timeout_penalty: -20.0

  rollout:
    max_rollout_s: 35.0
    depth_inference_stride: 5
    settle_vel_mps: 0.12
    settle_body_rate_radps: 0.35
    settle_yaw_rate_radps: 0.30
    settle_steps: 8

  ppo:
    lr: 3.0e-5
    clip_eps: 0.1
    entropy_coef: 0.005
    ref_kl_coef: 0.02
    n_epochs: 1
    batch_size: 64
